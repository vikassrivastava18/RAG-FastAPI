<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/tree.css" />
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.png" />

    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />

    <!-- Bootstrrap Select Css -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta2/css/bootstrap-select.min.css" />
    <!-- Style CSS -->
    <link rel="stylesheet" href="/assets/css/style.css?v=2.0" />

</head>

<body>
    <div class="template-wrapper">
        <div class="container mt-2">
            <div class="innerContainer p-2">
                <header>
                    <div class="head-section text-center">
                        <div class="logobrand">
                            <img src="/assets/images/logo1.png" alt="Logo" />
                        </div>
                    </div>
                </header>

                <!-- Bootstap tabs -->
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#section1">
                            Learn
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#section2">
                            Ask
                        </button>
                    </li>
                </ul>

                <div class="tab-content mt-3">

                    <div class="tab-pane fade show active" id="section1">
                        <div class="row">
                            <div class="col-xs-3">
                                <label for="bookSelect">Select a book</label>
                                <select name="bookSelect" id="bookSelect">
                                    <option value="healthAlt" class="form-control">Health Alteration</option>
                                    <option value="bluePrint" class="form-control">Blueprint</option>
                                </select>
                            </div>
                            <div class="col-xs-3">
                                <label for="chapterSelect">Select a Chapter</label>
                                <select name="chapterSelect" id="chapterSelect">
                                    <option value="healthAlt" class="form-control">Health Alteration</option>
                                    <option value="bluePrint" class="form-control">Blueprint</option>
                                </select>
                            </div>

                        </div>
                    </div>

                    <div class="tab-pane fade" id="section2">
                        <label for="exampleTextarea" class="form-label">Ask me anything</label>
                        <textarea class="form-control" id="exampleTextarea" rows="3"
                            placeholder="Enter your description here...">
                        </textarea>
                    </div>

                </div>
                </main>

            </div>
        </div>
    </div>

    <!-- docx library -->
    <script src="https://cdn.jsdelivr.net/npm/docx@7.1.0/build/index.min.js"></script>

    <!-- jQuery (should load before Bootstrap if you’re using jQuery plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>

    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Bootstrap Select (must come after jQuery and Bootstrap) -->
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta2/js/bootstrap-select.min.js"></script>

    <!-- CAPTCHA (can remain anywhere due to async/defer) -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>


    <!-- selec 2 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

    <div id="custom-popup" class="popup-overlay" style="display: none">
        <div class="popup-box">
            <p id="popup-message">This is a popup message</p>
            <button id="popup-close">OK</button>
        </div>
    </div>
</body>

</html>
